packages:
  - packages/*

catalog:
  '@ava/typescript': ^7.0.0
  '@babel/core': ^7.29.7
  '@babel/plugin-syntax-jsx': ^7.29.7
  '@eslint-react/eslint-plugin': ^5.9.2
  '@eslint-react/kit': ^5.9.2
  '@eslint/css': ^1.3.0
  '@eslint/js': ^10.0.1
  '@monorepo-utils/workspaces-to-typescript-project-references': ^2.11.0
  '@reflink/reflink': ^0.1.19
  '@rollup/plugin-alias': ^6.0.0
  '@rollup/plugin-babel': ^7.1.0
  '@rollup/plugin-commonjs': ^29.0.3
  '@rollup/plugin-node-resolve': ^16.0.3
  '@rollup/plugin-replace': ^6.0.3
  '@rollup/plugin-swc': ^0.4.1
  '@swc/core': ^1.15.43
  '@types/node': ^26.1.0
  '@types/react': ^19.2.16
  '@types/react-dom': ^19.2.3
  '@typescript-eslint/eslint-plugin': ^8.61.1
  '@typescript-eslint/parser': ^8.62.0
  ava: ^8.0.1
  babel-plugin-react-compiler: ^1.0.0
  eslint: ^10.5.0
  eslint-config-prettier: ^10.1.8
  eslint-config-turbo: ^2.10.3
  eslint-plugin-import-x: ^4.17.1
  eslint-plugin-react-hooks: ^7.1.1
  expect-type: ^1.4.0
  globals: ^17.7.0
  option-t: ^56.1.2
  postcss: ^8.5.15
  postcss-import: ^16.1.1
  prettier: ^3.9.4
  react: ^19.2.7
  react-dom: ^19.2.7
  rollup: ^4.62.2
  tinyspy: ^4.0.4
  turbo: ^2.10.3
  typescript: ^7.0.2
  web-ext: ^10.4.0

catalogs:
  # Workaround some packages' `peerDependencies` which specify `typescript` to `*` but they only work with `^6`.
  typescript6:
    'typescript': npm:@typescript/typescript6@^6.0.1

minimumReleaseAge: 7200 # 60min * 24hrs * 5days
minimumReleaseAgeExclude:
  - '@typescript/typescript-*'
  - option-t
  - typescript

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 60min * 24hrs * 30days

# Mitigate an attack vector for a typical supply chain attack.
blockExoticSubdeps: true

strictDepBuilds: true
allowBuilds:
  '@swc/core': false
  spawn-sync: false
  unrs-resolver: false

strictPeerDependencies: true # Detect peerDependencies corretness
