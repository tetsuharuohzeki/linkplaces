packages:
  - packages/*

catalog:
  '@ava/typescript': ^7.0.0
  '@babel/cli': ^7.29.7
  '@babel/core': ^7.29.7
  '@babel/plugin-syntax-jsx': ^7.29.7
  '@babel/preset-react': ^7.29.7
  '@eslint-react/eslint-plugin': ^5.8.12
  '@eslint-react/kit': ^5.8.12
  '@eslint/css': ^1.3.0
  '@eslint/js': ^10.0.1
  '@monorepo-utils/workspaces-to-typescript-project-references': ^2.11.0
  '@reflink/reflink': ^0.1.19
  '@rollup/plugin-alias': ^6.0.0
  '@rollup/plugin-babel': ^7.1.0
  '@rollup/plugin-commonjs': ^29.0.3
  '@rollup/plugin-node-resolve': ^16.0.3
  '@rollup/plugin-replace': ^6.0.3
  '@rollup/plugin-swc': ^0.4.1
  '@swc/core': ^1.15.40
  '@types/node': ^25.9.1
  '@types/react': ^19.2.16
  '@types/react-dom': ^19.2.3
  '@typescript-eslint/eslint-plugin': ^8.61.0
  '@typescript-eslint/parser': ^8.61.0
  '@typescript/native-preview': 7.0.0-dev.20260603.1
  ava: ^8.0.1
  babel-plugin-react-compiler: ^1.0.0
  eslint: ^10.4.1
  eslint-config-prettier: ^10.1.8
  eslint-config-turbo: ^2.9.16
  eslint-plugin-import-x: ^4.16.2
  eslint-plugin-react-hooks: ^7.1.1
  expect-type: ^1.3.0
  globals: ^17.6.0
  option-t: ^56.1.2
  postcss: ^8.5.15
  postcss-import: ^16.1.1
  prettier: ^3.8.3
  react: ^19.2.7
  react-dom: ^19.2.7
  rollup: ^4.61.1
  tinyspy: ^4.0.4
  turbo: ^2.9.16
  web-ext: ^10.3.0

minimumReleaseAge: 7200 # 60min * 24hrs * 5days
minimumReleaseAgeExclude:
  - '@typescript/native-preview'
  - '@typescript/native-preview-*'
  - option-t
  - typescript

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 60min * 24hrs * 30days

# Mitigate an attack vector for a typical supply chain attack.
blockExoticSubdeps: true

strictDepBuilds: true
allowBuilds:
  '@swc/core': false
  spawn-sync: false
  unrs-resolver: false
