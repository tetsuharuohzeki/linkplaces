packages:
  - packages/*

catalog:
  '@ava/typescript': ^7.0.0
  '@babel/cli': ^7.28.6
  '@babel/core': ^7.29.0
  '@babel/plugin-syntax-jsx': ^7.28.6
  '@babel/preset-react': ^7.28.5
  '@eslint-react/eslint-plugin': ^4.2.3
  '@eslint-react/kit': ^4.2.3
  '@eslint/css': ^1.1.0
  '@eslint/js': ^10.0.1
  '@monorepo-utils/workspaces-to-typescript-project-references': ^2.11.0
  '@reflink/reflink': ^0.1.19
  '@rollup/plugin-alias': ^6.0.0
  '@rollup/plugin-babel': ^7.0.0
  '@rollup/plugin-commonjs': ^29.0.2
  '@rollup/plugin-node-resolve': ^16.0.3
  '@rollup/plugin-replace': ^6.0.3
  '@rollup/plugin-swc': ^0.4.0
  '@swc/core': ^1.15.26
  '@types/node': ^25.6.0
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  '@typescript-eslint/eslint-plugin': ^8.58.2
  '@typescript-eslint/parser': ^8.58.2
  '@typescript/native-preview': ^7.0.0-dev.20260421.2
  ava: ^7.0.0
  babel-plugin-react-compiler: ^1.0.0
  eslint: ^10.2.0
  eslint-config-prettier: ^10.1.8
  eslint-config-turbo: ^2.9.6
  eslint-plugin-import-x: ^4.16.2
  eslint-plugin-react-hooks: ^7.1.1
  expect-type: ^1.3.0
  globals: ^17.5.0
  option-t: ^56.1.0
  postcss: ^8.5.10
  postcss-import: ^16.1.1
  prettier: ^3.8.3
  react: ^19.2.5
  react-dom: ^19.2.5
  rollup: ^4.60.2
  tinyspy: ^4.0.4
  turbo: ^2.9.6
  web-ext: ^10.1.0

minimumReleaseAge: 7200
minimumReleaseAgeExclude:
  - '@typescript/native-preview'
  - '@typescript/native-preview-*'
  - option-t
  - typescript

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 60 * 24 * 30 min

# Mitigate an attack vector for a typical supply chain attack.
blockExoticSubdeps: true

strictDepBuilds: true
allowBuilds:
  '@swc/core': false
  spawn-sync: false
  unrs-resolver: false
