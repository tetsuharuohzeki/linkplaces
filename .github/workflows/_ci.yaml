name: CI workflow template
# we need separate CI workflow template to achieve that a CI
# for each of PRs cancellable and one for default branch should run on every commits
# because the runner will use `concurrency.group` in the callee worfklow which is
# configured as cancellable if we don't set `concurrency.group` to caller workflow.
on:
    workflow_call:

permissions:
    contents: read

jobs:
    warmup_dependency_cache:
        timeout-minutes: 10 # This value is just by feeling.
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup_ci

    build:
        timeout-minutes: 10 # This value is just by feeling.
        needs: [warmup_dependency_cache]
        runs-on: ubuntu-latest
        strategy:
            matrix:
                variants:
                    - release
                    - debug
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup_ci
            - name: build
              run: make build_${{ matrix.variants }} -j
              env:
                  CI: true

    lint:
        needs: [warmup_dependency_cache]
        timeout-minutes: 10 # This value is just by feeling.
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup_ci
            - name: Lint
              run: make lint -j
              env:
                  CI: true

    check_type_integrity:
        needs: [warmup_dependency_cache]
        timeout-minutes: 10 # This value is just by feeling.
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup_ci
            - name: typecheck
              run: make typecheck -j
              env:
                  CI: true

    check_formatting:
        needs: [warmup_dependency_cache]
        timeout-minutes: 10 # This value is just by feeling.
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup_ci
            - name: check formatting
              run: make format_check -j
              env:
                  CI: true

    unittest:
        needs: [warmup_dependency_cache]
        timeout-minutes: 10 # This value is just by feeling.
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: ./.github/actions/setup_ci
            - name: Run unittests
              run: make test -j
              env:
                  CI: true

    sentinel:
        timeout-minutes: 10
        needs:
            - build
            - lint
            - check_type_integrity
            - check_formatting
            - unittest
        runs-on: ubuntu-slim
        if: ${{ always() }}
        steps:
            - name: Check whether required jobs are successful
              if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
              # Fail this job
              run: exit 1
